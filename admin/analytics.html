<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Analytics — Mirage Studios</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030201;
  --bg2:rgba(255,255,255,0.03);
  --bg3:rgba(255,255,255,0.055);
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --text:rgba(240,230,210,0.88);
  --text2:rgba(240,230,210,0.5);
  --text3:rgba(240,230,210,0.28);
  --gold:rgba(185,140,55,0.85);
  --gold2:rgba(185,140,55,0.4);
  --gold-bg:rgba(185,140,55,0.08);
  --gold-border:rgba(185,140,55,0.25);
  --red:rgba(197,83,76,0.85);
  --green:rgba(86,168,96,0.85);
  --green-bg:rgba(86,168,96,0.08);
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;min-height:100vh}

/* Header */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:52px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:rgba(3,2,1,0.96);backdrop-filter:blur(8px);z-index:100;
}
.brand{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:300;color:var(--text);letter-spacing:-0.01em}
.brand-sub{font-size:9px;color:var(--gold2);letter-spacing:0.22em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-left:12px}
.nav{display:flex;gap:20px}
.nav a{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;color:var(--text2);text-decoration:none}
.nav a:hover{color:var(--gold)}
.nav a.active{color:var(--gold)}

.main{max-width:1100px;margin:0 auto;padding:36px 28px 80px}

/* Page header */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap}
.page-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;color:var(--text)}

/* Filters */
.filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-select{
  background:var(--bg2);border:1px solid var(--border2);border-radius:3px;
  padding:5px 10px;color:var(--text2);font-size:10px;font-family:'JetBrains Mono',monospace;
  outline:none;cursor:pointer;appearance:none;
}
.filter-select:focus{border-color:var(--gold2)}
.filter-label{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:0.1em;white-space:nowrap}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:0 12px;height:30px;border-radius:3px;
  font-size:9px;letter-spacing:0.18em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;
  cursor:pointer;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);
  transition:all 0.15s;white-space:nowrap;
}
.btn:hover{background:var(--bg3);color:var(--text)}
.btn-gold{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-border)}
.btn-gold:hover{background:rgba(185,140,55,0.15);color:rgba(185,140,55,1)}

/* Summary cards */
.summary-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:32px;
}
.stat-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:16px 18px;
}
.stat-card:hover{border-color:var(--border2)}
.stat-label{font-size:8px;letter-spacing:0.22em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;color:var(--text3);margin-bottom:6px}
.stat-value{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--text);line-height:1}
.stat-sub{font-size:9px;color:var(--text3);margin-top:4px;font-family:'JetBrains Mono',monospace}
.stat-live{color:var(--green);font-size:9px;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:4px;margin-top:4px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* Section */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);
}
.section-title{
  font-size:9px;letter-spacing:0.22em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;color:var(--text3)
}
.section-block{margin-bottom:32px}

/* Tables */
.table-wrap{overflow-x:auto;border-radius:4px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
thead th{
  font-size:8px;letter-spacing:0.2em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;
  color:var(--text3);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);
  background:rgba(255,255,255,0.015);white-space:nowrap;
}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,0.025)}
td{padding:10px 14px;font-size:11px;vertical-align:middle;white-space:nowrap}
.td-wrap{white-space:normal;max-width:260px}
.mono{font-family:'JetBrains Mono',monospace;font-size:10px}
.dim{color:var(--text3)}
.email{color:var(--text2)}
.live-badge{
  display:inline-block;font-size:7px;letter-spacing:0.2em;text-transform:uppercase;
  font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:2px;
  background:var(--green-bg);color:var(--green);border:1px solid rgba(86,168,96,0.2);
}
.deck-badge{
  font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--gold2);
}

/* Duration display */
.dur{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2)}

/* Empty */
.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:11px}

/* Spinner */
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.6s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{
  font-size:9px;letter-spacing:0.18em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;
  color:var(--text3);padding:8px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all 0.15s;
}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* Deck selector */
.deck-pill{
  font-size:9px;letter-spacing:0.12em;font-family:'JetBrains Mono',monospace;
  padding:3px 10px;border-radius:20px;cursor:pointer;border:1px solid var(--border);
  color:var(--text3);background:transparent;transition:all 0.15s;
}
.deck-pill:hover{border-color:var(--border2);color:var(--text2)}
.deck-pill.active{border-color:var(--gold-border);color:var(--gold);background:var(--gold-bg)}
.deck-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;align-items:center}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;z-index:300;background:#0c0b09;border:1px solid var(--border2);border-radius:4px;padding:10px 16px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text2);transition:opacity 0.3s}
.toast.hidden{opacity:0;pointer-events:none}
.toast.ok{border-color:rgba(86,168,96,0.4);color:rgba(86,168,96,0.8)}
.toast.err{border-color:rgba(197,83,76,0.4);color:rgba(197,83,76,0.8)}

@media(max-width:600px){
  .header{padding:0 16px}
  .main{padding:24px 16px 60px}
  .summary-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<header class="header">
  <div style="display:flex;align-items:baseline;gap:4px">
    <span class="brand">Mirage Studios</span>
    <span class="brand-sub">Admin</span>
  </div>
  <div style="display:flex;align-items:center;gap:20px">
    <nav class="nav">
      <a href="/">Proposals</a>
      <a href="/analytics" class="active">Analytics</a>
    </nav>
    <form method="POST" action="/auth/logout" style="margin:0">
      <button type="submit" class="btn" style="height:26px;font-size:8px">Sign out</button>
    </form>
  </div>
</header>

<main class="main">
  <div class="topbar">
    <h1 class="page-title">Analytics</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn" id="refresh-btn" onclick="loadAll()">↻ Refresh</button>
      <button class="btn btn-gold" id="export-btn" onclick="exportCsv()">Export CSV</button>
    </div>
  </div>

  <!-- Summary cards -->
  <div id="summary-grid" class="summary-grid">
    <div style="grid-column:1/-1;padding:32px 0;text-align:center"><span class="spinner"></span></div>
  </div>

  <!-- Deck filter pills -->
  <div id="deck-pills" class="deck-pills" style="display:none"></div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="viewers" onclick="switchTab('viewers')">Viewers</div>
    <div class="tab" data-tab="sessions" onclick="switchTab('sessions')">Sessions</div>
  </div>

  <!-- Viewers tab -->
  <div id="tab-viewers">
    <div id="viewers-loading" style="text-align:center;padding:32px"><span class="spinner"></span></div>
    <div id="viewers-table" style="display:none"></div>
  </div>

  <!-- Sessions tab -->
  <div id="tab-sessions" style="display:none">
    <div id="sessions-loading" style="text-align:center;padding:32px"><span class="spinner"></span></div>
    <div id="sessions-table" style="display:none"></div>
  </div>
</main>

<div class="toast hidden" id="toast"></div>

<script>
const ROOT = window.__ROOT_DOMAIN__ || 'miragestudios.io';
const proposals = window.__PROPOSALS__ || [];

let summaryData = [];
let viewersData = [];
let sessionsData = [];
let activeDeck = null;
let activeTab = 'viewers';

/* ── Toast ─────────────────────────────────────────────────── */
let toastTimer;
function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast hidden', 3200);
}

/* ── Format helpers ────────────────────────────────────────── */
function fmtDur(sec) {
  if (!sec) return '—';
  if (sec < 60) return sec + 's';
  const m = Math.floor(sec / 60), s = sec % 60;
  if (m < 60) return `${m}m ${s}s`;
  const h = Math.floor(m / 60), rm = m % 60;
  return `${h}h ${rm}m`;
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' }) + ' ' +
         d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:false });
}
function fmtDateShort(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Load data ─────────────────────────────────────────────── */
async function loadAll() {
  document.getElementById('refresh-btn').textContent = '↻ Refreshing…';
  try {
    await Promise.all([loadSummary(), loadViewers(), loadSessions()]);
    showToast('Data refreshed');
  } catch(e) {
    showToast('Error: ' + e.message, 'err');
  } finally {
    document.getElementById('refresh-btn').textContent = '↻ Refresh';
  }
}

async function loadSummary() {
  const deckParam = activeDeck ? `?deck=${encodeURIComponent(activeDeck)}` : '';
  const r = await fetch('/api/analytics/summary' + deckParam);
  summaryData = await r.json();
  renderSummary();
}

async function loadViewers() {
  const deckParam = activeDeck ? `?slug=${encodeURIComponent(activeDeck)}` : '';
  const r = await fetch('/api/analytics/sessions' + deckParam);
  // sessions API returns raw session rows; we'll display them as viewers grouped
  const raw = await r.json();
  viewersData = raw;
  renderViewers();
}

async function loadSessions() {
  const deckParam = activeDeck ? `?slug=${encodeURIComponent(activeDeck)}` : '';
  const r = await fetch('/api/analytics/sessions' + deckParam);
  sessionsData = await r.json();
  renderSessions();
}

/* ── Deck pills ────────────────────────────────────────────── */
function renderDeckPills() {
  const el = document.getElementById('deck-pills');
  if (!proposals.length) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  const pills = [{ slug: null, name: 'All proposals' }, ...proposals.map(p => ({ slug: p.slug, name: p.name || p.slug }))];
  el.innerHTML = pills.map(p =>
    `<span class="deck-pill${activeDeck === p.slug ? ' active' : ''}" onclick="selectDeck(${JSON.stringify(p.slug)})">${esc(p.name)}</span>`
  ).join('');
}

function selectDeck(slug) {
  activeDeck = slug;
  renderDeckPills();
  loadAll();
}

/* ── Summary cards ─────────────────────────────────────────── */
function renderSummary() {
  const grid = document.getElementById('summary-grid');
  if (!summaryData.length) {
    grid.innerHTML = `<div style="grid-column:1/-1" class="empty">No analytics data yet. Sessions will appear once viewers open a proposal.</div>`;
    return;
  }

  const totals = summaryData.reduce((acc, d) => {
    acc.sessions   += d.totalSessions   || 0;
    acc.viewers    += d.uniqueViewers   || 0;
    acc.opens      += d.totalOpens      || 0;
    acc.activeNow  += d.activeNow       || 0;
    acc.avgSec     += d.avgSessionSeconds || 0;
    return acc;
  }, { sessions:0, viewers:0, opens:0, activeNow:0, avgSec:0 });
  const avgSec = summaryData.length ? Math.round(totals.avgSec / summaryData.length) : 0;

  const cards = [
    { label: 'Total sessions',   value: totals.sessions,  sub: 'across all proposals' },
    { label: 'Unique viewers',   value: totals.viewers,   sub: 'by email address' },
    { label: 'Total opens',      value: totals.opens,     sub: 'lifetime' },
    { label: 'Avg session',      value: fmtDur(avgSec),   sub: 'active time' },
    { label: 'Viewing now',      value: totals.activeNow, sub: totals.activeNow > 0 ? 'live' : 'no active sessions', live: totals.activeNow > 0 },
  ];

  grid.innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="stat-label">${c.label}</div>
      <div class="stat-value">${c.value}</div>
      ${c.live ? `<div class="stat-live"><span class="live-dot"></span>Live</div>` : `<div class="stat-sub">${c.sub}</div>`}
    </div>
  `).join('');
}

/* ── Viewers table ─────────────────────────────────────────── */
function renderViewers() {
  const loading = document.getElementById('viewers-loading');
  const wrap = document.getElementById('viewers-table');
  loading.style.display = 'none';
  wrap.style.display = 'block';

  if (!viewersData.length) {
    wrap.innerHTML = `<div class="empty">No sessions recorded yet.</div>`;
    return;
  }

  // Group sessions by email+deck
  const grouped = new Map();
  for (const s of viewersData) {
    const key = (s.deckSlug || '') + '|' + (s.email || '');
    let g = grouped.get(key);
    if (!g) {
      g = { deck: s.deckSlug, email: s.email, sessions: 0, totalSec: 0, first: s.startedAt, last: s.startedAt, activeNow: false };
      grouped.set(key, g);
    }
    g.sessions++;
    g.totalSec += s.durationSeconds || 0;
    if (!s.endedAt) g.activeNow = true;
    if (s.startedAt < g.first) g.first = s.startedAt;
    if (s.startedAt > g.last) g.last = s.startedAt;
  }

  const rows = Array.from(grouped.values()).sort((a, b) => b.last.localeCompare(a.last));

  wrap.innerHTML = `<div class="table-wrap"><table>
    <thead><tr>
      <th>Email</th>
      <th>Proposal</th>
      <th>Sessions</th>
      <th>Total time</th>
      <th>First seen</th>
      <th>Last seen</th>
      <th>Status</th>
    </tr></thead>
    <tbody>
    ${rows.map(r => `<tr>
      <td class="email mono">${esc(r.email || '—')}</td>
      <td class="deck-badge">${esc(r.deck)}</td>
      <td class="mono dim">${r.sessions}</td>
      <td class="dur">${fmtDur(r.totalSec)}</td>
      <td class="mono dim" style="font-size:9px">${fmtDateShort(r.first)}</td>
      <td class="mono dim" style="font-size:9px">${fmtDate(r.last)}</td>
      <td>${r.activeNow ? '<span class="live-badge">Live</span>' : ''}</td>
    </tr>`).join('')}
    </tbody>
  </table></div>`;
}

/* ── Sessions table ────────────────────────────────────────── */
function renderSessions() {
  const loading = document.getElementById('sessions-loading');
  const wrap = document.getElementById('sessions-table');
  loading.style.display = 'none';
  wrap.style.display = 'block';

  if (!sessionsData.length) {
    wrap.innerHTML = `<div class="empty">No sessions recorded yet.</div>`;
    return;
  }

  wrap.innerHTML = `<div class="table-wrap"><table>
    <thead><tr>
      <th>Session ID</th>
      <th>Proposal</th>
      <th>Email</th>
      <th>Started</th>
      <th>Duration</th>
      <th>Top section</th>
      <th>Status</th>
    </tr></thead>
    <tbody>
    ${sessionsData.map(s => `<tr>
      <td class="mono dim" style="font-size:9px">${esc((s.id||'').slice(0,8))}…</td>
      <td class="deck-badge">${esc(s.deckSlug)}</td>
      <td class="email mono">${esc(s.email || '—')}</td>
      <td class="mono dim" style="font-size:9px">${fmtDate(s.startedAt)}</td>
      <td class="dur">${fmtDur(s.durationSeconds)}</td>
      <td class="dim" style="font-size:10px">${esc(s.topSection ? s.topSection.sectionId : '—')}</td>
      <td>${!s.endedAt ? '<span class="live-badge">Live</span>' : '<span class="dim" style="font-size:9px">ended</span>'}</td>
    </tr>`).join('')}
    </tbody>
  </table></div>`;
}

/* ── Tabs ──────────────────────────────────────────────────── */
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('tab-viewers').style.display  = tab === 'viewers'  ? 'block' : 'none';
  document.getElementById('tab-sessions').style.display = tab === 'sessions' ? 'block' : 'none';
}

/* ── CSV export ────────────────────────────────────────────── */
function exportCsv() {
  const data = activeTab === 'sessions' ? sessionsData : viewersData;
  if (!data.length) { showToast('No data to export', 'err'); return; }

  let csv = '';
  if (activeTab === 'sessions') {
    csv = 'session_id,deck,email,started_at,ended_at,duration_sec,top_section\n';
    csv += data.map(s => [
      s.id, s.deckSlug, s.email||'', s.startedAt, s.endedAt||'',
      s.durationSeconds, s.topSection ? s.topSection.sectionId : ''
    ].map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  } else {
    // Group for viewers CSV
    const grouped = new Map();
    for (const s of data) {
      const key = (s.deckSlug||'') + '|' + (s.email||'');
      let g = grouped.get(key);
      if (!g) { g = { deck: s.deckSlug, email: s.email||'', sessions:0, totalSec:0, first: s.startedAt, last: s.startedAt }; grouped.set(key, g); }
      g.sessions++; g.totalSec += s.durationSeconds||0;
      if (s.startedAt < g.first) g.first = s.startedAt;
      if (s.startedAt > g.last) g.last = s.startedAt;
    }
    csv = 'email,deck,sessions,total_seconds,first_seen,last_seen\n';
    csv += Array.from(grouped.values()).map(r =>
      [r.email, r.deck, r.sessions, r.totalSec, r.first, r.last]
      .map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')
    ).join('\n');
  }

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `mirage-${activeTab}-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast('CSV exported');
}

/* ── Init ──────────────────────────────────────────────────── */
renderDeckPills();
loadAll();

// Auto-refresh every 30s
setInterval(() => {
  if (!document.hidden) {
    fetch('/api/analytics/summary').then(r => r.json()).then(d => { summaryData = d; renderSummary(); }).catch(() => {});
  }
}, 30000);
</script>
</body>
</html>
